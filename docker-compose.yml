version: '3.8'

services:
  claude-flow:
    build: .
    image: claude-flow:latest
    container_name: claude-flow
    volumes:
      # Mount current directory as workspace
      - .:/workspace
      # Persist memory and configuration
      - claude-flow-memory:/opt/claude-flow/memory
      - claude-flow-config:/opt/claude-flow/config
    environment:
      # Pass through API key if set
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Default environment variables
      - CLAUDE_FLOW_LOG_LEVEL=info
      - CLAUDE_FLOW_SWARM_MAX_AGENTS=10
      - CLAUDE_FLOW_SWARM_STRATEGY=auto
      - CLAUDE_FLOW_SWARM_MODE=centralized
      - CLAUDE_FLOW_SWARM_MONITORING=true
      - CLAUDE_FLOW_DOCKER=true
    working_dir: /workspace
    tty: true
    stdin_open: true
    networks:
      - claude-flow-network
    # Container runs as a persistent service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "claude-flow", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  claude-flow-memory:
    driver: local
  claude-flow-config:
    driver: local

networks:
  claude-flow-network:
    driver: bridge